<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviços</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{background:#f4f4f4;}

header{
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
border-bottom:2px solid #c9a646;
}

header img{height:34px;}

nav a{
margin-left:12px;
text-decoration:none;
color:#222;
font-size:13px;
}

.container{
padding:40px 20px;
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:25px;
}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.visual{
height:200px;
display:flex;
align-items:center;
justify-content:center;
background:#f8f8f8;
}

.pericia{
font-size:50px;
color:#c9a646;
}

.img{
width:100%;
height:200px;
object-fit:cover;
}

.geo{
background:
url('https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?auto=format&fit=crop&w=1200&q=80');
background-size:cover;
}

.doc{
background:#fafafa;
position:relative;
}

.doc::before{
content:'';
width:80px;
height:100px;
border:2px solid #ccc;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
}

.card h3{
padding:18px;
text-align:center;
font-size:18px;
}

footer{
text-align:center;
padding:20px;
font-size:13px;
background:#fff;
margin-top:30px;
}

@media(min-width:768px){
.grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<nav>
<a href="/index.html">Início</a>
<a href="/servicos.html">Serviços</a>
<a href="/contato.html">Contato</a>
</nav>
</header>

<div class="container">
<div class="grid">

<div class="card">
<div class="visual">
<div class="pericia">⚖</div>
</div>
<h3>Perícia Rural</h3>
</div>

<div class="card">
<img class="img" src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1200&q=80">
<h3>Consultoria Agrícola</h3>
</div>

<div class="card">
<div class="visual geo"></div>
<h3>Geoprocessamento</h3>
</div>

<div class="card">
<div class="visual doc"></div>
<h3>Regularização de Imóveis Rurais</h3>
</div>

</div>
</div>

<footer>
Raddar Agronegócios — Soluções Técnicas e Inteligência para o Agro
</footer>

</body>
</html>
