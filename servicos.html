<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serviços | Raddar Agronegócios</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background: #f4f4f4;
    }

    /* MENU */
    header {
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 2px solid #c9a646;
    }

    header img {
      height: 34px;
    }

    nav a {
      margin-left: 12px;
      text-decoration: none;
      color: #222;
      font-size: 13px;
      font-weight: 500;
    }

    /* CONTAINER */
    .container {
      padding: 40px 20px;
      max-width: 1100px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
    }

    /* CARD */
    .card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card h3 {
      padding: 18px;
      font-size: 18px;
      text-align: center;
      color: #111;
    }

    /* RODAPÉ */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #777;
      background: #ffffff;
      border-top: 1px solid #eee;
    }

    /* DESKTOP */
    @media (min-width: 768px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }

      .card img {
        height: 220px;
      }
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" alt="Raddar Agronegócios">
  <nav>
    <a href="index.html">Início</a>
    <a href="servicos.html">Serviços</a>
    <a href="contato.html">Contato</a>
  </nav>
</header>

<div class="container">
  <div class="grid">

    <!-- PERÍCIA -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1598514982846-1cf8f7b3c3c3?auto=format&fit=crop&w=1200&q=80">
      <h3>Perícia Rural</h3>
    </div>

    <!-- CONSULTORIA -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1560493676-04071c5f467b?auto=format&fit=crop&w=1200&q=80">
      <h3>Consultoria Agrícola</h3>
    </div>

    <!-- GEOPROCESSAMENTO -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1581093458791-9d15482442f7?auto=format&fit=crop&w=1200&q=80">
      <h3>Geoprocessamento</h3>
    </div>

    <!-- REGULARIZAÇÃO -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1554224155-6726b3ff858f?auto=format&fit=crop&w=1200&q=80">
      <h3>Regularização de Imóveis Rurais</h3>
    </div>

  </div>
</div>

<footer>
  Raddar Agronegócios — Soluções Técnicas e Inteligência para o Agro
</footer>

</body>
</html>
