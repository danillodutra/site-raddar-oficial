<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato | Raddar Agronegócios</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background: #f4f4f4;
      color: #222;
    }

    header {
      background: #fff;
      border-bottom: 2px solid #c9a646;
    }

    .topo {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo img {
      height: 34px;
      display: block;
    }

    nav {
      display: flex;
      gap: 24px;
    }

    nav a {
      text-decoration: none;
      color: #222;
      font-size: 15px;
      font-weight: 500;
    }

    nav a:hover,
    nav a.ativo {
      color: #c9a646;
    }

    .pagina {
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 20px 60px;
      text-align: center;
    }

    .pagina h1 {
      font-size: 34px;
      margin-bottom: 14px;
    }

    .pagina p.intro {
      max-width: 680px;
      margin: 0 auto 30px;
      font-size: 16px;
      line-height: 1.7;
      color: #666;
    }

    .bloco-contato {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.04);
      padding: 32px 24px;
      border-top: 3px solid #c9a646;
      max-width: 620px;
      margin: 0 auto;
    }

    .item {
      font-size: 18px;
      line-height: 1.8;
      color: #444;
    }

    footer {
      background: #fff;
      text-align: center;
      padding: 18px 20px;
      font-size: 13px;
      color: #777;
      border-top: 1px solid #ececec;
    }

    @media (max-width: 768px) {
      .topo {
        padding: 12px 16px;
      }

      .logo img {
        height: 28px;
      }

      nav {
        gap: 14px;
      }

      nav a {
        font-size: 14px;
      }

      .pagina {
        padding: 35px 16px 45px;
      }

      .pagina h1 {
        font-size: 28px;
      }

      .pagina p.intro {
        font-size: 15px;
      }

      .bloco-contato {
        padding: 26px 18px;
      }

      .item {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="topo">
      <a class="logo" href="index.html">
        <img src="logo.png" alt="Raddar Agronegócios">
      </a>

      <nav>
        <a href="index.html">Início</a>
        <a href="servicos.html">Serviços</a>
        <a class="ativo" href="contato.html">Contato</a>
      </nav>
    </div>
  </header>

  <main class="pagina">
    <h1>Contato</h1>
    <p class="intro">
      Entre em contato para informações sobre atuação técnica, perícias,
      consultoria e serviços especializados no agronegócio.
    </p>

    <div class="bloco-contato">
      <div class="item">SEU TELEFONE</div>
      <div class="item">SEU E-MAIL</div>
      <div class="item">SUA CIDADE / ESTADO</div>
    </div>
  </main>

  <footer>
    Raddar Agronegócios — Soluções Técnicas e Inteligência para o Agro
  </footer>

</body>
</html>
