<title>Contato | Raddar Agronegócios</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    color: #1c2b36;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: #ffffff;
    border-bottom: 2px solid #c8a96a;
}

.logo img {
    height: 60px;
}

/* MENU */
nav a {
    text-decoration: none;
    color: #1c2b36;
    margin-left: 25px;
    font-weight: 500;
    transition: 0.3s;
}

nav a:hover {
    color: #c8a96a;
}

/* CONTAINER */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 40px 30px;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

.subtitulo {
    text-align: center;
    margin-bottom: 30px;
    color: #555;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
}

/* CARD CONTATO */
.card {
    background: #ffffff;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.card strong {
    display: block;
    margin-top: 15px;
}

/* LINK TELEFONE */
.card a {
    color: #1c2b36;
    text-decoration: none;
}

.card a:hover {
    color: #c8a96a;
}

/* LOGO LADO DIREITO */
.logo-box {
    background: #ffffff;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    padding: 20px;
}

.logo-box img {
    width: 100%;
    max-width: 300px;
    object-fit: contain;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 15px;
    font-size: 14px;
    color: #777;
    background: #ffffff;
}

/* MOBILE */
@media(max-width:768px){
    .grid {
        grid-template-columns: 1fr;
    }

    header {
        padding: 10px 20px;
    }

    .logo img {
        height: 50px;
    }
}
</style>

</head>
