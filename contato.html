<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato | Raddar Agronegócios</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background: #f4f4f4;
      color: #222;
    }

    header {
      background: #fff;
      border-bottom: 2px solid #c9a646;
    }

    .topo {
      max-width: 1200px;
      margin: auto;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo img {
      height: 34px;
    }

    nav {
      display: flex;
      gap: 24px;
    }

    nav a {
      text-decoration: none;
      color: #222;
      font-size: 15px;
    }

    nav a.ativo {
      color: #c9a646;
      font-weight: 600;
    }

    .pagina {
      max-width: 1100px;
      margin: auto;
      padding: 50px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .intro {
      text-align: center;
      margin-bottom: 40px;
      color: #666;
    }

    .contato-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .info {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      border-top: 3px solid #c9a646;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .info p {
      margin-bottom: 12px;
      font-size: 16px;
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: 300px;
      border: none;
      border-radius: 10px;
    }

    footer {
      background: #fff;
      text-align: center;
      padding: 18px;
      font-size: 13px;
      color: #777;
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .contato-box {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="topo">
    <div class="logo">
      <img src="logo.png">
    </div>

    <nav>
      <a href="index.html">Início</a>
      <a href="servicos.html">Serviços</a>
      <a class="ativo" href="contato.html">Contato</a>
    </nav>
  </div>
</header>

<div class="pagina">

  <h1>Contato</h1>

  <p class="intro">
    Entre em contato para informações sobre perícias, consultoria e serviços técnicos especializados.
  </p>

  <div class="contato-box">

    <!-- DADOS -->
    <div class="info">
      <p><strong>Telefone:</strong> (64) 99999-9999</p>
      <p><strong>Email:</strong> contato@raddaragronegocios.com.br</p>
      <p><strong>Localização:</strong> Goiânia - GO</p>
    </div>

    <!-- MAPA -->
    <div>
      <iframe 
        src="https://www.google.com/maps?q=Goiânia%20GO&output=embed">
      </iframe>
    </div>

  </div>

</div>

<footer>
  Raddar Agronegócios — Soluções Técnicas e Inteligência para o Agro
</footer>

</body>
</html>
