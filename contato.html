<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato | Raddar Agronegócios</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    color: #1c2b36;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: #fff;
    border-bottom: 2px solid #c8a96a;
}

.logo img {
    height: 60px;
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: #1c2b36;
    transition: 0.3s;
}

nav a:hover {
    color: #c8a96a;
}

/* CONTEÚDO */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 40px 20px;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

.subtitulo {
    text-align: center;
    margin-bottom: 30px;
    color: #666;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
}

/* CARD */
.card {
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

/* CONTATO COM LOGO */
.contato-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* TEXTO */
.texto-contato {
    width: 60%;
}

/* LOGO DIREITA */
.logo-contato {
    width: 160px;
}

/* MAPA */
.mapa iframe {
    width: 100%;
    height: 300px;
    border-radius: 15px;
    border: none;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 15px;
    color: #777;
}

/* MOBILE */
@media(max-width:768px){
    .grid {
        grid-template-columns: 1fr;
    }

    .contato-card {
        flex-direction: column;
        text-align: center;
    }

    .texto-contato {
        width: 100%;
    }

    .logo-contato {
        margin-top: 20px;
    }
}
</style>

</head>

<body>

<header>

<div class="logo">
    <img src="logo.png">
</div>

</nav>
