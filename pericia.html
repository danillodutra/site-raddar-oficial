<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perícia Rural | Raddar Agronegócios</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat', sans-serif;
}

body{
background:#f4f4f4;
color:#222;
}

/* HEADER */
header{
background:#fff;
border-bottom:2px solid #c9a646;
}

.topo{
max-width:1200px;
margin:auto;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo img{
height:34px;
}

nav{
display:flex;
gap:20px;
}

nav a{
text-decoration:none;
color:#222;
font-size:15px;
}

nav a.ativo{
color:#c9a646;
font-weight:600;
}

/* CONTEÚDO */
.container{
max-width:1000px;
margin:auto;
padding:50px 20px;
}

h1{
font-size:32px;
margin-bottom:30px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

/* CARD */
.card{
background:#fff;
padding:25px;
border-radius:12px;
border-top:3px solid #c9a646;
font-weight:600;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* MOBILE */
@media(max-width:768px){

h1{
font-size:26px;
text-align:center;
}

/* vira lista (1 coluna) */
.grid{
grid-template-columns:1fr;
gap:15px;
}

/* cards mais compactos */
.card{
padding:18px;
font-size:15px;
text-align:center;
border-radius:10px;
}

nav{
gap:12px;
font-size:14px;
}

}
</style>

</head>

<body>

<header>
<div class="topo">
<div class="logo">
<img src="logo.png">
</div>

<nav>
<a href="index.html">Início</a>
<a href="servicos.html">Serviços</a>
<a href="contato.html">Contato</a>
</nav>
</div>
</header>

<div class="container">

<h1>Perícia Rural</h1>

<div class="grid">

<div class="card">Servidão Administrativa</div>

<div class="card">Avaliação de Imóveis Rurais</div>

<div class="card">Frustração de Safra (Lavouras)</div>

<div class="card">Redução da Capacidade Produtiva Pecuária</div>

</div>

</div>

</body>
</html>
