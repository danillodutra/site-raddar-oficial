<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perícia Rural | Raddar Agronegócios</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #caa24c;
        }

        header img {
            height: 35px;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }

        nav a:hover {
            color: #caa24c;
        }

        .container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 20px;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 32px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            transition: 0.3s;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card h2 {
            padding: 20px;
            font-size: 18px;
        }

        footer {
            text-align: center;
            margin: 60px 0 30px;
            font-size: 14px;
            color: #777;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

<header>
    <img src="logo.png" alt="Raddar Agronegócios">

    <nav>
        <a href="index.html">Início</a>
        <a href="servicos.html">Serviços</a>
        <a href="contato.html">Contato</a>
    </nav>
</header>

<div class="container">
    <h1>Perícia Rural</h1>

    <div class="grid">

        <a href="servidao.html" class="card">
            <img src="pericia-servidao.png" alt="Servidão Administrativa">
            <h2>Servidão Administrativa</h2>
        </a>

        <a href="avaliacao.html" class="card">
            <img src="pericia-avaliacao.png" alt="Avaliação de Imóveis Rurais">
            <h2>Avaliação de Imóveis Rurais</h2>
        </a>

        <a href="frustracao-safra.html" class="card">
            <img src="pericia-lavoura.png" alt="Lavoura">
            <h2>Lavoura</h2>
        </a>

        <a href="pecuaria.html" class="card">
            <img src="pericia-pecuaria.png" alt="Pecuária">
            <h2>Pecuária</h2>
        </a>

    </div>
</div>

<footer>
    Raddar Agronegócios — Soluções Técnicas e Inteligência para o Agro
</footer>

</body>
</html>
