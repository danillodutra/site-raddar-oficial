<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raddar Agronegócios</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background-color: #f4f4f4;
    }

    /* NAVBAR */
    header {
      background: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 2px solid #c9a646;
    }

    header img {
      height: 34px;
    }

    nav a {
      margin-left: 12px;
      text-decoration: none;
      color: #222;
      font-size: 13px;
    }

    /* HERO */
    .hero {
      min-height: 70vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 30px 20px;

      background:
        linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1600&q=80');

      background-size: cover;
      background-position: center;
    }

    /* TÍTULO */
    .titulo {
      font-weight: 700;
      color: #111;
      letter-spacing: 1px;
    }

    .linha1 {
      display: block;
      font-size: 26px;
    }

    .linha2 {
      display: block;
      font-size: 26px;
      margin-top: 5px;
    }

    .subtitulo {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
      line-height: 1.4;
    }

    /* RODAPÉ */
    footer {
      text-align: center;
      padding: 15px;
      font-size: 12px;
      color: #777;
      background: #ffffff;
    }

    /* DESKTOP */
    @media (min-width: 768px) {
      .linha1,
      .linha2 {
        font-size: 36px;
      }

      .hero {
        min-height: 85vh;
      }

      .subtitulo {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <header>
    <img src="logo.png" alt="Raddar Agronegócios">
    <nav>
      <a href="#">Início</a>
      <a href="#">Serviços</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <section class="hero">
    <div>
      <h1 class="titulo">
        <span class="linha1">PERÍCIA •</span>
        <span class="linha2">CONSULTORIA</span>
      </h1>

      <p class="subtitulo">
        Atuação especializada com rigor técnico e segurança jurídica.
      </p>
    </div>
  </section>

  <footer>
    Raddar Agronegócios — Soluções Técnicas e Inteligência para o Agro
  </footer>

</body>
</html>
