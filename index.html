<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raddar Agronegócios</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
}

/* NAVBAR */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: #ffffff;
}

/* LOGO */
.logo img {
    height: 40px;
}

/* MENU */
nav a {
    text-decoration: none;
    color: #1c2b36;
    margin-left: 25px;
    font-weight: 500;
}

/* HERO */
.hero {
    height: 90vh;
    background: 
        linear-gradient(rgba(255,255,255,0.65), rgba(255,255,255,0.75)),
        url("pagina-inicial.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* TEXTO */
.hero-content h1 {
    font-size: 3rem;
    letter-spacing: 3px;
    color: #1c2b36;
}

.hero-content h2 {
    font-size: 2.2rem;
    margin-top: 10px;
}

.hero-content p {
    margin-top: 10px;
    color: #555;
}

/* LINHA ANIMADA */
.linha {
    width: 120px;
    height: 3px;
    margin: 20px auto;
    background: #c8a96a;
    position: relative;
    overflow: hidden;
}

.linha::after {
    content: "";
    position: absolute;
    width: 40px;
    height: 100%;
    background: white;
    left: -40px;
    animation: animar 2s infinite;
}

@keyframes animar {
    0% { left: -40px; }
    100% { left: 120px; }
}

/* RESPONSIVO */
@media(max-width:768px){
    .hero-content h1 { font-size: 2rem; }
    .hero-content h2 { font-size: 1.5rem; }
}
</style>

</head>

<body>

<header>

    <!-- LOGO -->
    <div class="logo">
        <img src="logo.png" alt="Raddar">
    </div>

    <!-- MENU -->
    <nav>
        <a href="index.html">Início</a>
        <a href="servicos.html">Serviços</a>
        <a href="#">Contato</a>
    </nav>

</header>

<section class="hero">

    <div class="hero-content">

        <h1>PERÍCIA</h1>

        <div class="linha"></div>

        <h2>CONSULTORIA</h2>

        <p>Atuação especializada com rigor técnico e segurança jurídica.</p>

    </div>

</section>

</body>
</html>
