<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raddar Agronegócios</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: #f2f2f2;
    }

    /* NAVBAR */
    header {
      background: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 2px solid #c9a646;
    }

    header img {
      height: 35px;
    }

    nav a {
      margin-left: 15px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    /* HERO */
    .hero {
      height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;

      background: linear-gradient(rgba(255,255,255,0.92), rgba(255,255,255,0.92)),
                  url('https://images.unsplash.com/photo-1500382017468-9049fed747ef');
      background-size: cover;
      background-position: center;
    }

    /* TÍTULO */
    .titulo {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.4;
      color: #000;
    }

    .titulo span {
      display: block;
    }

    .e {
      font-size: 28px;
      font-weight: 400;
      margin: 5px 0;
    }

    .subtitulo {
      margin-top: 15px;
      font-size: 15px;
      color: #666;
    }

    /* RODAPÉ */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #777;
      background: #ffffff;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .titulo {
        font-size: 26px;
      }

      .e {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <img src="logo.png" alt="Raddar Agronegócios">
    <nav>
      <a href="#">Início</a>
      <a href="#">Serviços</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div>
      <h1 class="titulo">
        <span>PERÍCIA</span>
        <span class="e">&</span>
        <span>CONSULTORIA</span>
      </h1>

      <p class="subtitulo">
        Atuação especializada com rigor técnico e segurança jurídica.
      </p>
    </div>
  </section>

  <!-- RODAPÉ -->
  <footer>
    Raddar Agronegócios — Soluções Técnicas e Inteligência para o Agro
  </footer>

</body>
</html>
