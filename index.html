<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raddar Agronegócios</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: #ffffff;
      border-bottom: 2px solid #d4af37;
    }

    header img {
      height: 45px;
    }

    nav a {
      color: #1a1a1a;
      text-decoration: none;
      margin-left: 30px;
      font-size: 18px;
    }

    nav a:hover {
      color: #b8860b;
    }

    .hero {
      text-align: center;
      padding: 140px 20px;
      position: relative;
      background: url('https://raw.githubusercontent.com/danillodutra/site-raddar-oficial/main/fundo.jpg') center/cover no-repeat;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: rgba(255,255,255,0.85);
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero h1 {
      font-size: 56px;
      margin-bottom: 25px;
      color: #111;
    }

    .hero p {
      font-size: 28px;
      max-width: 900px;
      margin: auto;
      color: #444;
    }

    .services {
      padding: 90px 40px;
      background: #f8f8f8;
    }

    .section-title {
      text-align: center;
      margin-bottom: 60px;
    }

    .section-title h2 {
      font-size: 42px;
    }

    .section-title p {
      font-size: 20px;
      color: #555;
    }

    @media (max-width: 900px) {
      .hero h1 {
        font-size: 36px;
      }

      .hero p {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png">
    <nav>
      <a href="#inicio">Início</a>
      <a href="#servicos">Serviços</a>
      <a href="#contato">Contato</a>
    </nav>
  </header>

  <section class="hero" id="inicio">
    <div class="hero-content">
      <h1>Perícia & Consultoria Agrícola</h1>
      <p>
        Atuação especializada com rigor técnico, segurança jurídica e excelência em soluções para o agronegócio.
      </p>
    </div>
  </section>

</body>
</html>
