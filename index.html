<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato | Raddar Agronegócios</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: #ffffff;
      border-bottom: 2px solid #d4af37;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    header img {
      height: 45px;
    }

    nav a {
      color: #1a1a1a;
      text-decoration: none;
      margin-left: 30px;
      font-size: 18px;
      font-weight: 500;
    }

    nav a:hover {
      color: #b8860b;
    }

    .contact {
      padding: 100px 40px;
      background: #ffffff;
      min-height: calc(100vh - 90px);
    }

    .contact-container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 45px;
      align-items: center;
    }

    .contact-info h1 {
      font-size: 42px;
      color: #111111;
      margin-bottom: 30px;
    }

    .contact-info p {
      font-size: 18px;
      color: #555555;
      margin-bottom: 14px;
      line-height: 1.7;
    }

    .contact-info strong {
      color: #1a1a1a;
    }

    .contact-link {
      color: #1a1a1a;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: 0.3s;
    }

    .contact-link:hover {
      color: #b8860b;
      border-bottom: 1px solid #b8860b;
    }

    .map iframe {
      width: 100%;
      height: 380px;
      border: 0;
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
    }

    @media (max-width: 900px) {
      header {
        flex-direction: column;
        gap: 15px;
        padding: 20px;
      }

      nav a {
        margin: 0 10px;
        font-size: 16px;
      }

      .contact {
        padding: 70px 20px;
      }

      .contact-container {
        grid-template-columns: 1fr;
      }

      .contact-info h1 {
        font-size: 32px;
      }
    }

    @media (max-width: 700px) {
      .contact-info p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="Raddar Agronegócios">
    <nav>
      <a href="index.html">Início</a>
      <a href="servicos.html">Serviços</a>
      <a href="contato.html">Contato</a>
    </nav>
  </header>

  <section class="contact">
    <div class="contact-container">
      <div class="contact-info">
        <h1>Contato & Localização</h1>

        <p><strong>Raddar Agronegócios</strong></p>

        <p>
          <strong>Endereço:</strong>
          <a
            class="contact-link"
            href="https://www.google.com/maps/place/Edif%C3%ADcio+Aquarius+Center/data=!4m2!3m1!1s0x0:0xad1762ca5f2a5764?sa=X&ved=1t:2428&ictx=111"
            target="_blank"
            rel="noopener noreferrer"
          >
            Edifício Aquarius Center Empresarial, Sala 1106, R. T-36, St. Bueno, Goiânia - GO, 74230-105
          </a>
        </p>

        <p>
          <strong>WhatsApp:</strong>
          <a
            class="contact-link"
            href="https://wa.me/5562999305405"
            target="_blank"
            rel="noopener noreferrer"
          >
            (62) 99930-5405
          </a>
        </p>

        <p><strong>Atendimento:</strong> Goiânia - GO</p>
      </div>

      <div class="map">
        <iframe
          src="https://www.google.com/maps?q=Edif%C3%ADcio+Aquarius+Center+Empresarial,+R.+T-36,+St.+Bueno,+Goi%C3%A2nia+-+GO,+74230-105&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </section>

</body>
</html>
