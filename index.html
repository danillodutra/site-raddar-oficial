<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raddar Agronegócios</title>

  <!-- FONTE PROFISSIONAL -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background-color: #f4f4f4;
    }

    /* NAVBAR */
    header {
      background: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      border-bottom: 2px solid #c9a646;
    }

    header img {
      height: 38px;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #222;
      font-size: 14px;
      font-weight: 500;
    }

    /* HERO */
    .hero {
      height: 85vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;

      background: linear-gradient(rgba(255,255,255,0.94), rgba(255,255,255,0.94)),
                  url('https://images.unsplash.com/photo-1500382017468-9049fed747ef');
      background-size: cover;
      background-position: center;
    }

    /* TÍTULO */
    .titulo {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #111;
    }

    .subtitulo {
      margin-top: 18px;
      font-size: 16px;
      color: #555;
    }

    /* RODAPÉ */
    footer {
      text-align: center;
      padding: 25px;
      font-size: 13px;
      color: #777;
      background: #ffffff;
      border-top: 1px solid #eee;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .titulo {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <img src="logo.png" alt="Raddar Agronegócios">
    <nav>
      <a href="#">Início</a>
      <a href="#">Serviços</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div>
      <h1 class="titulo">
        PERÍCIA • CONSULTORIA
      </h1>

      <p class="subtitulo">
        Atuação especializada com rigor técnico e segurança jurídica.
      </p>
    </div>
  </section>

  <!-- RODAPÉ -->
  <footer>
    Raddar Agronegócios — Soluções Técnicas e Inteligência para o Agro
  </footer>

</body>
</html>
