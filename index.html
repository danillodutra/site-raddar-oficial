<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raddar Agronegócios</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: #f5f5f5;
    }

    /* NAVBAR */
    header {
      background: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 2px solid #c9a646;
    }

    header img {
      height: 35px;
    }

    nav a {
      margin-left: 15px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
      font-weight: 500;
    }

    /* HERO */
    .hero {
      height: 85vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;

      /* leve fundo profissional */
      background: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)),
                  url('https://images.unsplash.com/photo-1500382017468-9049fed747ef');
      background-size: cover;
      background-position: center;
    }

    .titulo {
      font-weight: 700;
      line-height: 1.3;
    }

    .linha1 {
      display: block;
      font-size: 32px;
      color: #000;
    }

    .linha2 {
      display: block;
      font-size: 24px;
      font-weight: 500;
      color: #333;
    }

    .subtitulo {
      margin-top: 15px;
      font-size: 16px;
      color: #555;
    }

    /* BOTÃO */
    .botao {
      margin-top: 25px;
      display: inline-block;
      background: #c9a646;
      color: white;
      padding: 12px 25px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    .botao:hover {
      background: #a8882f;
    }

    /* RODAPÉ */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #777;
      background: #ffffff;
    }

    /* RESPONSIVO */
    @media (max-width: 600px) {
      .linha1 {
        font-size: 28px;
      }

      .linha2 {
        font-size: 20px;
      }

      nav a {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <img src="logo.png" alt="Raddar Agronegócios">
    <nav>
      <a href="#">Início</a>
      <a href="#">Serviços</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div>
      <h1 class="titulo">
        <span class="linha1">Perícia</span>
        <span class="linha2">& Consultoria Agrícola</span>
      </h1>

      <p class="subtitulo">
        Atuação especializada com rigor técnico e segurança jurídica.
      </p>

      <a href="#" class="botao">Fale com um especialista</a>
    </div>
  </section>

  <!-- RODAPÉ -->
  <footer>
    Raddar Agronegócios — Soluções Técnicas e Inteligência para o Agro
  </footer>

</body>
</html>
