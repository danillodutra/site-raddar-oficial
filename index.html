<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raddar Agronegócios</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  color: #111;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  border-bottom: 2px solid #d4af37;
}

header img {
  height: 35px;
}

nav {
  display: flex;
  gap: 20px;
}

nav a {
  text-decoration: none;
  color: #000;
  font-size: 16px;
}

/* HERO */
.hero {
  height: 85vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  text-align: center;
  background: #f5f5f5;
}

.hero h1 {
  font-size: 48px;
  line-height: 1.2;
  margin-bottom: 15px;
}

.hero p {
  font-size: 18px;
  color: #555;
  max-width: 500px;
}

/* MOBILE */
@media (max-width: 768px) {

  header {
    flex-direction: row;
  }

  nav {
    gap: 15px;
  }

  .hero {
    height: 80vh;
  }

  .hero h1 {
    font-size: 28px;
  }

  .hero p {
    font-size: 16px;
  }

}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #777;
  border-top: 1px solid #eee;
}
</style>

</head>

<body>

<header>
  <img src="logo.png">

  <nav>
    <a href="index.html">Início</a>
    <a href="servicos.html">Serviços</a>
    <a href="contato.html">Contato</a>
  </nav>
</header>

<section class="hero">

  <h1>
    Perícia & Consultoria<br>
    Agrícola
  </h1>

  <p>
    Atuação especializada com rigor técnico e segurança jurídica.
  </p>

</section>

<footer>
Raddar Agronegócios
</footer>

</body>
</html>
