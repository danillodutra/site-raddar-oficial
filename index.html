<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raddar Agronegócios</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: #ffffff;
      border-bottom: 2px solid #d4af37;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    header img {
      height: 45px;
    }

    nav a {
      color: #1a1a1a;
      text-decoration: none;
      margin-left: 30px;
      font-size: 18px;
      font-weight: 500;
    }

    nav a:hover {
      color: #b8860b;
    }

    .hero {
      min-height: 82vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px 20px;
      background: #f3f3f3;
    }

    .hero-content {
      max-width: 1100px;
    }

    .hero h1 {
      font-size: 60px;
      margin-bottom: 25px;
      color: #111111;
      font-weight: 700;
      line-height: 1.15;
    }

    .hero p {
      font-size: 26px;
      max-width: 900px;
      margin: 0 auto;
      color: #3f3f3f;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      header {
        flex-direction: column;
        gap: 15px;
        padding: 20px;
      }

      nav a {
        margin: 0 10px;
        font-size: 16px;
      }

      .hero {
        min-height: 70vh;
        padding: 80px 20px;
      }

      .hero h1 {
        font-size: 36px;
      }

      .hero p {
        font-size: 20px;
      }
    }

    @media (max-width: 700px) {
      .hero h1 {
        font-size: 32px;
      }

      .hero p {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="Raddar Agronegócios">
    <nav>
      <a href="index.html">Início</a>
      <a href="servicos.html">Serviços</a>
      <a href="contato.html">Contato</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Perícia & Consultoria Agrícola</h1>
      <p>
        Atuação especializada com rigor técnico, segurança jurídica e excelência em soluções para o agronegócio.
      </p>
    </div>
  </section>

</body>
</html>
