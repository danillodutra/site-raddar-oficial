<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raddar Agronegócios</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: #000;
    border-bottom: 2px solid #c59d2a;
}

header img {
    height: 60px;
}

nav a {
    color: #fff;
    margin-left: 20px;
    text-decoration: none;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 36px;
}

.hero p {
    max-width: 600px;
    margin: 20px auto;
}

.botao {
    background: #c62828;
    padding: 15px 30px;
    border-radius: 5px;
    display: inline-block;
    color: #fff;
    text-decoration: none;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" alt="Raddar Agronegócios">
    <nav>
        <a href="#">Início</a>
        <a href="#">Serviços</a>
        <a href="#">Contato</a>
    </nav>
</header>

<section class="hero">
    <h1>Perícia Rural e Consultoria Agrícola</h1>
    <p>Atuação técnica em perícia rural, crédito rural, geoprocessamento e regularização ambiental em todo o Brasil.</p>
    <a class="botao" href="#">Falar no WhatsApp</a>
</section>

</body>
</html>
