<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raddar Agronegócios</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    color: #1c2b36;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: #ffffff;
    border-bottom: 2px solid #c8a96a;
}

/* LOGO */
.logo img {
    height: 65px;
}

/* MENU */
nav {
    display: flex;
}

nav a {
    text-decoration: none;
    color: #1c2b36;
    margin-left: 25px;
    font-weight: 500;
    transition: 0.3s;
}

nav a:hover {
    color: #c8a96a;
}

/* HERO */
.hero {
    height: 90vh;
    background: 
        linear-gradient(rgba(255,255,255,0.55), rgba(255,255,255,0.65)),
        url("pagina-inicial.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* TEXTO */
.hero-content h1,
.hero-content h2 {
    font-size: 3rem;
    letter-spacing: 2px;
    font-weight: 600;
}

.linha {
    width: 90px;
    height: 2px;
    background: #c8a96a;
    margin: 18px auto;
}

.hero-content p {
    margin-top: 10px;
    color: #555;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 15px;
    font-size: 14px;
    color: #777;
    background: #ffffff;
}

/* 📱 MOBILE */
@media(max-width:768px){

    header {
        padding: 10px 20px;
    }

    .logo img {
        height: 55px;
    }

    nav {
        gap: 15px;
    }

    nav a {
        margin: 0;
        font-size: 14px;
    }

    .hero-content h1,
    .hero-content h2 {
        font-size: 2rem;
    }

}
</style>

</head>

<body>

<header>

<div class="logo">
    <img src="logo.png" alt="Raddar">
</div>

<nav>
    <a href="index.html">Início</a>
    <a href="servicos.html">Serviços</a>
    <a href="#">Contato</a>
</nav>

</header>

<section class="hero">

<div class="hero-content">

    <h1>PERÍCIA</h1>

    <div class="linha"></div>

    <h2>CONSULTORIA</h2>

    <p>Atuação especializada com rigor técnico e segurança jurídica.</p>

</div>

</section>

<div class="footer">
Raddar Agronegócios — Soluções Técnicas e Inteligência para o Agro
</div>

</body>
</html>
