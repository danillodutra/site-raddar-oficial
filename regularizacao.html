<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regularização de Imóveis Rurais | Raddar Agronegócios</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #1c2b36;
        }

        .container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 40px 30px 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin: 0 0 34px 0;
            color: #1c2b36;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 26px;
        }

        .card {
            display: block;
            background: #ffffff;
            border-radius: 18px;
            overflow: hidden;
            text-decoration: none;
            color: #1c2b36;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.10);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 22px 20px 24px;
        }

        .card h2 {
            margin: 0;
            font-size: 1.15rem;
            line-height: 1.3;
            color: #1c2b36;
        }

        .card-center {
            grid-column: 1 / -1;
            max-width: 640px;
            width: 100%;
            margin: 0 auto;
        }

        .voltar {
            text-align: center;
            margin: 38px 0 18px;
        }

        .voltar a {
            text-decoration: none;
            color: #1c2b36;
            font-size: 1rem;
            transition: opacity 0.2s ease;
        }

        .voltar a:hover {
            opacity: 0.75;
        }

        .footer {
            text-align: center;
            color: #7b7f86;
            font-size: 0.95rem;
            padding: 10px 20px 26px;
        }

        @media (max-width: 900px) {
            .container {
                padding: 30px 20px 16px;
            }

            h1 {
                font-size: 1.9rem;
                margin-bottom: 28px;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 22px;
            }

            .card-center {
                grid-column: auto;
                max-width: 100%;
            }

            .card img {
                height: 210px;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.7rem;
            }

            .card img {
                height: 190px;
            }

            .card-content {
                padding: 18px 16px 20px;
            }

            .card h2 {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Regularização de Imóveis Rurais</h1>

        <div class="grid">
            <a href="regularizacao-ambiental.html" class="card">
                <img src="regularizacao-ambiental.png" alt="Regularização Ambiental">
                <div class="card-content">
                    <h2>Regularização Ambiental</h2>
                </div>
            </a>

            <a href="outorga-agua.html" class="card">
                <img src="outorga-agua.png" alt="Outorga d’água">
                <div class="card-content">
                    <h2>Outorga d’água</h2>
                </div>
            </a>

            <a href="regularizacao-fundiaria.html" class="card card-center">
                <img src="regularizacao-fundiaria.png" alt="Regularização Fundiária e Jurídica">
                <div class="card-content">
                    <h2>Regularização Fundiária e Jurídica</h2>
                </div>
            </a>
        </div>

        <div class="voltar">
            <a href="servicos.html">← Voltar para Serviços</a>
        </div>
    </div>

    <div class="footer">
        Raddar Agronegócios — Soluções Técnicas e Inteligência para o Agro
    </div>

</body>
</html>
